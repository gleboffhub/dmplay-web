<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>Работы</title>

  <meta name="application-name" content="Работы">
  <meta name="apple-mobile-web-app-title" content="Работы">
  <meta name="theme-color" content="#111827">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">

  <link rel="icon" type="image/png" sizes="192x192" href="free-icon-tinder-2585175.png">
  <link rel="icon" type="image/png" sizes="512x512" href="free-icon-tinder-2585175.png">
  <link rel="apple-touch-icon" href="free-icon-tinder-2585175.png">

  <style>
    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      background: #f3f4f6;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      box-sizing: border-box;
    }

    .card {
      width: 100%;
      max-width: 420px;
      background: white;
      border-radius: 24px;
      padding: 24px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.12);
      text-align: center;
      box-sizing: border-box;
    }

    .icon {
      width: 86px;
      height: 86px;
      border-radius: 22px;
      margin-bottom: 18px;
    }

    .app-title-hidden {
      position: absolute;
      left: -9999px;
      top: -9999px;
      width: 1px;
      height: 1px;
      overflow: hidden;
      opacity: 0;
    }

    .visible-title {
      font-size: 24px;
      font-weight: bold;
      margin: 0 0 10px;
      color: #111827;
    }

    p {
      font-size: 16px;
      color: #6b7280;
      margin: 0 0 22px;
      line-height: 1.4;
    }

    a {
      display: block;
      text-decoration: none;
      background: #2563eb;
      color: white;
      padding: 16px;
      border-radius: 14px;
      font-size: 18px;
      font-weight: bold;
    }

    a:active {
      background: #1d4ed8;
    }
  </style>
</head>

<body>
  <div class="card">
    <img class="icon" src="free-icon-tinder-2585175.png" alt="Иконка">

    <h1 class="app-title-hidden">Работы</h1>
    <div class="visible-title">Плановые работы</div>

    <p>Открой список работ и скопируй текст для отправки.</p>

    <a href="https://script.google.com/macros/s/AKfycbwm_6tLU67Lzf2w1Stxfr8-moEFq7LZtLDTJOlV2GPja3QaYWliiXYr440aL3QC_dma/exec">
      Открыть список
    </a>
  </div>
</body>
</html>
